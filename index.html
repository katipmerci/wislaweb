<style>
  :root {
    --yellow: #5580cc;
    --black: #111111;
    --white: #FFFFFF;
    --pink: #A3E5DE;
    --pink-dark: #7DD4CC;
    --grey: #F4F4F2;
    --text-muted: #555555;
    --radius: 18px;
    --radius-lg: 26px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-style: normal;
    background: var(--white);
    color: var(--black);
    overflow-x: hidden;
  }

  /* Make absolutely sure nothing is italic */
  *, *::before, *::after { font-style: normal !important; }

  em, i { font-style: normal !important; }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 60px;
    background: rgba(255,255,255,0.94);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(0,0,0,0.07);
  }
  .nav-logo {
    display: flex; align-items: center; gap: 10px;
    font-weight: 800; font-size: 1.28rem;
    color: var(--black); text-decoration: none; letter-spacing: -0.02em;
  }
  .nav-logo-icon {
    width: 34px; height: 34px; background: var(--black);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
  }
  .nav-links { display: flex; gap: 32px; list-style: none; }
  .nav-links a {
    text-decoration: none; color: var(--black);
    font-size: 0.88rem; font-weight: 500; transition: opacity 0.2s;
  }
  .nav-links a:hover { opacity: 0.45; }
  .nav-right { display: flex; align-items: center; gap: 14px; }

  /* LANG TOGGLE */
  .lang-toggle {
    display: flex; align-items: center;
    background: var(--grey); border-radius: 50px; padding: 4px; gap: 2px;
  }
  .lang-btn {
    border: none; background: transparent; cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 700; font-size: 0.76rem;
    padding: 6px 14px; border-radius: 50px;
    letter-spacing: 0.04em; transition: background 0.2s, color 0.2s;
    color: var(--text-muted);
  }
  .lang-btn.active { background: var(--black); color: var(--white); }

  .nav-cta {
    background: var(--black); color: var(--white);
    padding: 10px 24px; border-radius: 50px;
    text-decoration: none; font-size: 0.86rem; font-weight: 600;
    transition: background 0.2s, transform 0.15s;
  }
  .nav-cta:hover { background: var(--yellow); color: var(--black); transform: scale(1.03); }

  /* ── HERO ── */
  #hero {
    min-height: 100vh;
    display: grid; grid-template-columns: 1fr 1fr;
    align-items: center; padding: 120px 60px 60px;
    background: var(--white); position: relative; overflow: hidden;
  }
  #hero::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0;
    height: 120px; background: var(--yellow);
    clip-path: ellipse(60% 100% at 50% 100%); z-index: 0;
  }
  .hero-text { position: relative; z-index: 1; }
  .hero-badge {
    display: inline-block; background: var(--yellow); color: #fff;
    font-size: 0.74rem; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 6px 16px; border-radius: 50px; margin-bottom: 26px;
  }
  .hero-text h1 {
    font-size: clamp(2.2rem, 4vw, 3.4rem);
    font-weight: 800; line-height: 1.1; margin-bottom: 22px;
    letter-spacing: -0.03em; color: var(--black);
  }
  .hero-text h1 .highlight {
    background: var(--yellow); padding: 0 8px; border-radius: 6px;
    display: inline-block;
  }
  .hero-text p {
    font-size: 1.05rem; color: var(--text-muted);
    line-height: 1.74; max-width: 440px; margin-bottom: 36px;
    font-weight: 400;
  }
  .hero-actions { display: flex; gap: 14px; flex-wrap: wrap; }
  .btn-primary {
    background: var(--black); color: var(--white);
    padding: 14px 30px; border-radius: 50px;
    text-decoration: none; font-weight: 700; font-size: 0.9rem;
    transition: background 0.2s, transform 0.2s; display: inline-block;
  }
  .btn-primary:hover { background: var(--yellow); color: var(--black); transform: translateY(-2px); }
  .btn-outline {
    border: 2px solid var(--black); color: var(--black);
    padding: 12px 26px; border-radius: 50px;
    text-decoration: none; font-weight: 700; font-size: 0.9rem;
    transition: background 0.2s, transform 0.2s; display: inline-block;
  }
  .btn-outline:hover { background: var(--black); color: var(--white); transform: translateY(-2px); }
  .hero-features { display: flex; gap: 16px; margin-top: 44px; flex-wrap: nowrap; }
  .hero-feat {
    display: flex; align-items: center; gap: 10px;
    font-size: 0.86rem; font-weight: 600; color: var(--black);
  }
  .hero-feat-icon {
    width: 32px; height: 32px; background: var(--grey);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
  }
  .hero-visual {
    display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 1;
  }
  .hero-mockup {
    width: 400px; height: 300px; background: var(--black);
    border-radius: var(--radius-lg); overflow: hidden;
    box-shadow: 0 40px 100px rgba(0,0,0,0.22);
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .mockup-bar {
    height: 34px; background: rgba(255,255,255,0.08);
    display: flex; align-items: center; padding: 0 14px; gap: 7px;
  }
  .mockup-dot { width: 10px; height: 10px; border-radius: 50%; }
  .mockup-content { padding: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .mb { border-radius: 9px; animation: pb 2.5s ease-in-out infinite; }
  @keyframes pb { 0%,100%{opacity:1} 50%{opacity:0.65} }
  .hero-floating-tag {
    position: absolute; bottom: -18px; left: -30px;
    background: var(--white); border-radius: 13px;
    padding: 11px 18px; box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    display: flex; align-items: center; gap: 9px;
    font-size: 0.8rem; font-weight: 700;
    animation: float 3.5s ease-in-out infinite reverse;
  }
  .tag-dot { width: 9px; height: 9px; border-radius: 50%; background: #22c55e; }
  .hero-floating-tag2 {
    position: absolute; top: -16px; right: -20px;
    background: var(--yellow); border-radius: 13px;
    padding: 9px 17px; box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    font-size: 0.78rem; font-weight: 700;
    animation: float 5s ease-in-out infinite;
  }

  /* ── YELLOW BAND ── */
  .band-yellow {
    background: var(--yellow); padding: 80px 60px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center;
  }
  .band-yellow h2 {
    font-size: clamp(1.6rem,3vw,2.5rem);
    font-weight: 800; line-height: 1.18; letter-spacing: -0.02em;
  }
  .band-yellow p { font-size: 1rem; color: rgba(0,0,0,0.65); line-height: 1.78; font-weight: 400; }

  /* ── SERVICES ── */
  #services { padding: 100px 60px; background: var(--white); }
  .section-label {
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px;
  }
  .section-title {
    font-size: clamp(1.6rem,3vw,2.4rem);
    font-weight: 800; line-height: 1.18; margin-bottom: 14px;
    max-width: 540px; letter-spacing: -0.02em;
  }
  .section-desc {
    font-size: 1rem; color: var(--text-muted); line-height: 1.76;
    max-width: 500px; margin-bottom: 52px; font-weight: 400;
  }
  .services-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 22px; }
  .service-card {
    border-radius: var(--radius); overflow: hidden;
    border: 1.5px solid rgba(0,0,0,0.07);
    transition: transform 0.25s, box-shadow 0.25s;
  }
  .service-card:hover { transform: translateY(-6px); box-shadow: 0 20px 60px rgba(0,0,0,0.09); }
  .service-img { height: 180px; display: flex; align-items: center; justify-content: center; font-size: 3.2rem; padding: 28px; }
  .si1{background:linear-gradient(135deg,#D4F5E0,#B8EDCC)}
  .si2{background:linear-gradient(135deg,#FFE0B2,#FFCC80)}
  .si3{background:linear-gradient(135deg,#FFB3C6,#FF6B9D)}
  .si4{background:linear-gradient(135deg,#B3D4FF,#7AB3FF)}
  .service-body { padding: 20px 20px 24px; }
  .service-body h3 { font-weight: 700; font-size: 0.97rem; margin-bottom: 9px; letter-spacing: -0.01em; }
  .service-body p { font-size: 0.86rem; color: var(--text-muted); line-height: 1.66; font-weight: 400; }

  /* ── COLLAB ── */
  #collab {
    padding: 100px 60px; background: var(--grey);
    display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center;
  }
  .collab-visual {
    background: var(--white); border-radius: var(--radius-lg);
    height: 360px; padding: 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.07);
    display: flex; flex-direction: column; gap: 12px;
  }
  .collab-browser-bar { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
  .collab-dot { width: 10px; height: 10px; border-radius: 50%; }
  .col-row { display: flex; gap: 10px; }
  .col-block { border-radius: 9px; flex: 1; animation: shimmer 2.5s ease-in-out infinite; }
  @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:0.6} }
  .collab-text h2 {
    font-size: clamp(1.5rem,2.5vw,2.2rem);
    font-weight: 800; line-height: 1.18; margin-bottom: 18px; letter-spacing: -0.02em;
  }
  .collab-text p {
    font-size: 1rem; color: var(--text-muted); line-height: 1.76;
    margin-bottom: 36px; font-weight: 400;
  }
  .collab-features { display: flex; gap: 26px; flex-wrap: wrap; }
  .collab-feat { display: flex; align-items: flex-start; gap: 10px; flex: 1; min-width: 120px; }
  .cf-icon {
    width: 36px; height: 36px; background: var(--black);
    border-radius: 9px; display: flex; align-items: center; justify-content: center;
    font-size: 1rem; flex-shrink: 0;
  }
  .cf-text { font-size: 0.84rem; font-weight: 700; line-height: 1.45; }

  /* ── PORTFOLIO ── */
  #portfolio { padding: 100px 60px; background: var(--pink); }
  .portfolio-header { margin-bottom: 52px; }
  .portfolio-header h2 {
    font-size: clamp(1.6rem,3vw,2.5rem);
    font-weight: 800; line-height: 1.18; margin-bottom: 12px; letter-spacing: -0.02em;
  }
  .portfolio-header p {
    font-size: 1rem; color: rgba(0,0,0,0.65); line-height: 1.7;
    max-width: 480px; font-weight: 400;
  }
  .portfolio-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; }
  .portfolio-card {
    border-radius: var(--radius); overflow: hidden;
    background: var(--white); box-shadow: 0 8px 30px rgba(0,0,0,0.07);
    transition: transform 0.3s, box-shadow 0.3s; cursor: pointer;
  }
  .portfolio-card:hover { transform: translateY(-8px); box-shadow: 0 24px 70px rgba(0,0,0,0.13); }

  /* Detailed portfolio thumb */
  .portfolio-thumb {
    aspect-ratio: 16 / 9; width: 100%; position: relative; overflow: hidden;
    display: flex; align-items: stretch;
  }
  .pt1{background:linear-gradient(160deg,#0d1117,#1a2236)}
  .pt2{background:linear-gradient(160deg,#f5f5f0,#eaeae0)}
  .pt3{background:linear-gradient(135deg,#667eea,#764ba2)}

  .pt-mockup {
    width: 100%; height: 100%; padding: 6px 8px; display: flex; flex-direction: column; gap: 4px;
  }
  .pt-nav {
    display: flex; justify-content: space-between; align-items: center;
  }
  .pt-logo-block {
    width: 36px; height: 6px; border-radius: 2px; background: rgba(0,0,0,0.5);
  }
  .pt-nav-links { display: flex; gap: 4px; }
  .pt-nav-link { width: 18px; height: 5px; border-radius: 2px; background: rgba(0,0,0,0.18); }

  .pt-hero-block {
    border-radius: 6px; padding: 7px; margin-top: 1px;
  }
  .pt-hero-title { height: 8px; border-radius: 2px; margin-bottom: 4px; background: rgba(0,0,0,0.55); }
  .pt-hero-sub { height: 5px; border-radius: 2px; width: 75%; background: rgba(0,0,0,0.25); margin-bottom: 6px; }
  .pt-hero-btn { height: 12px; width: 44px; border-radius: 20px; }

  .pt-cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 3px; margin-top: 1px; }
  .pt-card-item { border-radius: 5px; padding: 5px; }
  .pt-card-icon { width: 10px; height: 10px; border-radius: 2px; margin-bottom: 3px; background: rgba(0,0,0,0.2); }
  .pt-card-line { height: 4px; border-radius: 2px; background: rgba(0,0,0,0.12); margin-bottom: 2px; }
  .pt-card-line.short { width: 60%; }

  .pt-gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; margin-top: 1px; }
  .pt-gallery-item { border-radius: 4px; }

  .portfolio-tag {
    position: absolute; top: 13px; right: 13px;
    background: rgba(255,255,255,0.15); color: var(--white);
    font-size: 0.68rem; font-weight: 700; letter-spacing: 0.07em;
    text-transform: uppercase; padding: 5px 11px; border-radius: 50px;
    backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2);
  }

  .portfolio-body { padding: 22px 24px 26px; }
  .portfolio-type {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px;
  }
  .portfolio-body h3 {
    font-weight: 800; font-size: 1.08rem; margin-bottom: 10px; letter-spacing: -0.02em;
  }
  .portfolio-body p { font-size: 0.86rem; color: var(--text-muted); line-height: 1.66; margin-bottom: 16px; font-weight: 400; }
  .portfolio-features { display: flex; flex-direction: column; gap: 6px; }
  .pf-row {
    display: flex; align-items: center; gap: 7px;
    font-size: 0.8rem; font-weight: 600; color: var(--black);
  }
  .pf-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--yellow); flex-shrink: 0; }

  /* ── PRICING ── */
  #pricing {
    padding: 100px 60px; background: var(--grey);
    display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start;
  }
  .pricing-left h2 {
    font-size: clamp(1.6rem,3vw,2.5rem);
    font-weight: 800; line-height: 1.18; margin-bottom: 18px; letter-spacing: -0.02em;
  }
  .pricing-left p {
    font-size: 1rem; color: var(--text-muted); line-height: 1.76;
    margin-bottom: 30px; font-weight: 400;
  }
  .btn-dark {
    display: inline-block; background: var(--black); color: var(--white);
    padding: 13px 28px; border-radius: 50px; text-decoration: none;
    font-weight: 700; font-size: 0.88rem; transition: background 0.2s, transform 0.2s;
  }
  .btn-dark:hover { background: var(--yellow); color: var(--black); transform: translateY(-2px); }
  .pricing-right { display: flex; flex-direction: row; gap: 18px; }
  .pricing-card {
    border-radius: var(--radius); overflow: hidden;
    border: 1.5px solid rgba(0,0,0,0.07); background: var(--white);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .pricing-card:hover { transform: translateY(-4px); box-shadow: 0 16px 50px rgba(0,0,0,0.09); }
  .pricing-card.featured {
    background: var(--black); color: var(--white);
    border-color: var(--black); position: relative;
  }
  .pricing-badge {
    position: absolute; top: -1px; right: 22px;
    background: var(--yellow); color: var(--black);
    font-size: 0.68rem; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.07em; padding: 4px 13px; border-radius: 0 0 9px 9px;
  }
  .pricing-top { padding: 26px 26px 18px; }
  .pricing-name { font-weight: 700; font-size: 0.97rem; margin-bottom: 7px; }
  .pricing-price { font-weight: 800; font-size: 2.8rem; line-height: 1; letter-spacing: -0.03em; }
  .pricing-price span { font-size: 1.1rem; font-weight: 500; }
  .pricing-period { font-size: 0.8rem; color: var(--text-muted); margin-top: 3px; }
  .pricing-card.featured .pricing-period { color: rgba(255,255,255,0.5); }
  .pricing-desc { font-size: 0.86rem; color: var(--text-muted); margin-top: 9px; line-height: 1.6; font-weight: 400; }
  .pricing-card.featured .pricing-desc { color: rgba(255,255,255,0.6); }
  .pricing-cta {
    display: block; text-align: center; margin: 14px 26px;
    padding: 12px; border-radius: 50px; text-decoration: none;
    font-weight: 700; font-size: 0.88rem; transition: transform 0.2s;
  }
  .pricing-cta:hover { transform: scale(1.02); }
  .pricing-card.featured .pricing-cta { background: var(--white); color: var(--yellow); }
  .pricing-card:not(.featured) .pricing-cta { background: var(--black); color: var(--white); }
  .pricing-features {
    background: var(--pink); padding: 18px 26px;
    display: flex; flex-direction: column; gap: 9px;
  }
  .pricing-card.featured .pricing-features { background: rgba(163,229,222,0.12); }
  .pf-item { display: flex; align-items: center; gap: 9px; font-size: 0.84rem; font-weight: 600; }
  .pf-check {
    width: 19px; height: 19px; border-radius: 50%;
    background: var(--black); color: var(--yellow);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem; flex-shrink: 0; font-weight: 800;
  }
  .pricing-card.featured .pf-check { background: var(--yellow); color: var(--black); }

  /* ── CTA BAND ── */
  .cta-band {
    background: var(--black); color: var(--white);
    padding: 88px 60px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 40px; flex-wrap: wrap;
  }
  .cta-band h2 {
    font-size: clamp(1.5rem,2.8vw,2.4rem);
    font-weight: 800; line-height: 1.18; max-width: 480px; letter-spacing: -0.02em;
  }
  .cta-band h2 .accent { color: var(--yellow); }
  .cta-btn-yellow {
    background: var(--yellow); color: var(--black);
    padding: 15px 34px; border-radius: 50px; text-decoration: none;
    font-weight: 700; font-size: 0.97rem; white-space: nowrap;
    transition: transform 0.2s;
  }
  .cta-btn-yellow:hover { transform: scale(1.04); }

  /* ── FOOTER ── */
  footer { background: #5580cc; padding: 58px 60px 28px; }
  .footer-top {
    display: grid; grid-template-columns: 1.5fr 1fr 1fr 1.2fr;
    gap: 48px; padding-bottom: 44px;
    border-bottom: 1.5px solid rgba(0,0,0,0.13);
  }
  .footer-brand h3 { font-weight: 800; font-size: 1.3rem; margin-bottom: 9px; letter-spacing: -0.02em; }
  .footer-brand p { font-size: 0.86rem; color: rgba(0,0,0,0.6); line-height: 1.7; max-width: 230px; font-weight: 400; }
  .footer-col h4 { font-weight: 700; font-size: 0.86rem; margin-bottom: 14px; }
  .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 9px; }
  .footer-col ul li a { text-decoration: none; color: rgba(0,0,0,0.62); font-size: 0.84rem; transition: color 0.2s; font-weight: 500; }
  .footer-col ul li a:hover { color: var(--black); }
  .footer-subscribe h4 { font-weight: 700; font-size: 0.86rem; margin-bottom: 5px; }
  .footer-subscribe p { font-size: 0.8rem; color: rgba(0,0,0,0.6); margin-bottom: 13px; line-height: 1.5; font-weight: 400; }
  .subscribe-form { display: flex; gap: 7px; }
  .subscribe-form input {
    flex: 1; padding: 10px 15px; border-radius: 50px;
    border: 1.5px solid rgba(0,0,0,0.18); background: rgba(255,255,255,0.5);
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.83rem; outline: none;
  }
  .subscribe-form input:focus { border-color: var(--black); background: var(--white); }
  .subscribe-form button {
    background: var(--black); color: var(--white); border: none;
    border-radius: 50px; padding: 10px 18px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 700; font-size: 0.8rem; cursor: pointer; white-space: nowrap;
  }
  .footer-bottom {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 22px; font-size: 0.8rem; color: rgba(0,0,0,0.5);
    flex-wrap: wrap; gap: 10px; font-weight: 500;
  }
  .footer-socials { display: flex; gap: 18px; }
  .footer-socials a { color: rgba(0,0,0,0.6); text-decoration: none; font-size: 0.82rem; font-weight: 600; transition: color 0.2s; }
  .footer-socials a:hover { color: var(--black); }

  /* ── REVEAL & INTERACTIONS ── */
  .reveal { opacity: 0; transform: translateY(32px); transition: opacity 0.7s cubic-bezier(0.22,1,0.36,1), transform 0.7s cubic-bezier(0.22,1,0.36,1); }
  .reveal.visible { opacity: 1; transform: translateY(0); }
  .reveal-left { opacity: 0; transform: translateX(-32px); transition: opacity 0.7s cubic-bezier(0.22,1,0.36,1), transform 0.7s cubic-bezier(0.22,1,0.36,1); }
  .reveal-left.visible { opacity: 1; transform: translateX(0); }
  .reveal-right { opacity: 0; transform: translateX(32px); transition: opacity 0.7s cubic-bezier(0.22,1,0.36,1), transform 0.7s cubic-bezier(0.22,1,0.36,1); }
  .reveal-right.visible { opacity: 1; transform: translateX(0); }
  .stagger > * { opacity: 0; transform: translateY(20px); transition: opacity 0.55s cubic-bezier(0.22,1,0.36,1), transform 0.55s cubic-bezier(0.22,1,0.36,1); }
  .stagger.visible > *:nth-child(1) { opacity:1; transform:translateY(0); transition-delay: 0s; }
  .stagger.visible > *:nth-child(2) { opacity:1; transform:translateY(0); transition-delay: 0.12s; }
  .stagger.visible > *:nth-child(3) { opacity:1; transform:translateY(0); transition-delay: 0.22s; }
  .stagger.visible > *:nth-child(4) { opacity:1; transform:translateY(0); transition-delay: 0.32s; }

  /* Button press */
  .btn-primary:active, .btn-outline:active, .btn-dark:active,
  .cta-btn-yellow:active, .nav-cta:active { transform: scale(0.96) !important; }

  /* Card hover lift */
  .service-card { transition: transform 0.3s cubic-bezier(0.22,1,0.36,1), box-shadow 0.3s ease !important; }
  .service-card:hover { transform: translateY(-8px) !important; box-shadow: 0 24px 60px rgba(0,0,0,0.12) !important; }
  .portfolio-card { transition: transform 0.3s cubic-bezier(0.22,1,0.36,1), box-shadow 0.3s ease !important; }
  .portfolio-card:hover { transform: translateY(-8px) scale(1.01) !important; box-shadow: 0 28px 70px rgba(0,0,0,0.14) !important; }
  .pricing-card { transition: transform 0.3s cubic-bezier(0.22,1,0.36,1), box-shadow 0.3s !important; }
  .pricing-card:hover { transform: translateY(-6px) !important; box-shadow: 0 24px 60px rgba(0,0,0,0.13) !important; }

  /* Nav underline slide */
  .nav-links a { position: relative; }
  .nav-links a::after { content:''; position:absolute; bottom:-3px; left:0; width:0; height:2px; background:var(--yellow); transition:width 0.25s cubic-bezier(0.22,1,0.36,1); border-radius:2px; }
  .nav-links a:hover::after { width:100%; }

  /* WhatsApp pulse */
  @keyframes waPulse { 0%,100%{box-shadow:0 8px 30px rgba(37,211,102,0.3)} 50%{box-shadow:0 8px 42px rgba(37,211,102,0.55)} }
  a[href*="wa.me"] { animation: waPulse 2.4s ease-in-out infinite; }

  /* Collab step slide */
  .collab-step { transition: transform 0.25s cubic-bezier(0.22,1,0.36,1), box-shadow 0.25s, border-color 0.25s !important; }
  .collab-step:hover { transform: translateX(6px) !important; border-color: var(--yellow) !important; box-shadow: 0 8px 24px rgba(0,0,0,0.08) !important; }

  /* Portfolio thumb zoom */
  .portfolio-thumb { overflow: hidden; }
  .portfolio-thumb > * { transition: transform 0.5s cubic-bezier(0.22,1,0.36,1) !important; }
  .portfolio-card:hover .portfolio-thumb > * { transform: scale(1.05) !important; }

  /* Hero badge bounce */
  @keyframes badgeBounce { 0%,100%{transform:translateY(0)} 40%{transform:translateY(-4px)} 60%{transform:translateY(-2px)} }
  .hero-badge { animation: badgeBounce 3s ease-in-out infinite; display:inline-block; }

  /* Page enter */
  @keyframes pageEnter { from{opacity:0} to{opacity:1} }
  body { animation: pageEnter 0.6s ease-out both; }
  nav { animation: pageEnter 0.5s ease-out 0.1s both; }
  #hero .hero-text { animation: pageEnter 0.7s ease-out 0.2s both; }

  /* Footer link nudge */
  .foot-col a { transition: color 0.2s, transform 0.2s; display:inline-block; }
  .foot-col a:hover { transform: translateX(4px); }

  /* Scroll progress bar */
  #scroll-bar { position:fixed; top:0; left:0; height:3px; background:var(--yellow); z-index:9999; width:0%; transition:width 0.1s linear; border-radius:0 2px 2px 0; }

  /* MODAL */
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 9999; background: rgba(0,0,0,0);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 12px; box-sizing: border-box;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease, background 0.3s ease;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; background: rgba(0,0,0,0.72); }
  .modal-box {
    background: var(--white); border-radius: 20px;
    width: 100%; max-width: 900px;
    max-height: calc(100vh - 24px);
    overflow-y: auto; overflow-x: hidden;
    box-shadow: 0 30px 100px rgba(0,0,0,0.4);
    position: relative;
    transform: translateY(40px) scale(0.97); opacity: 0;
    transition: transform 0.45s cubic-bezier(0.22,1,0.36,1), opacity 0.35s ease;
    transition-delay: 0.08s;
    -webkit-overflow-scrolling: touch;
  }
  .modal-overlay.open .modal-box { transform: translateY(0) scale(1); opacity: 1; }
  .modal-close {
    position: sticky; top: 0; z-index: 10;
    display: flex; justify-content: flex-end;
    padding: 12px 16px 0; background: var(--white);
  }
  .modal-close button {
    background: var(--grey); border: none; cursor: pointer;
    width: 36px; height: 36px; border-radius: 50%;
    font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .modal-close button:hover { background: #ddd; }
  .modal-preview { padding: 0 20px 28px; }

  /* Mobile modal — fills screen, content scales down */
  @media (max-width: 600px) {
    .modal-overlay { padding: 0; align-items: flex-end; }
    .modal-box {
      border-radius: 20px 20px 0 0;
      max-height: 92vh;
      width: 100%;
    }
    .modal-preview { padding: 0 12px 20px; }
    /* Scale down inner preview content on mobile */
    .modal-preview > div {
      transform-origin: top left;
      font-size: 0.72rem;
    }
    /* All inner grids → single column */
    .modal-preview [style*="grid-template-columns"] {
      display: flex !important;
      flex-direction: column !important;
    }
    /* Inner flex rows → wrap */
    .modal-preview [style*="display:flex"] {
      flex-wrap: wrap;
    }
    /* Limit inner image heights */
    .modal-preview [style*="height:110px"] { height: 70px !important; }
    .modal-preview [style*="height:48px"] { height: 36px !important; }
    /* Reduce huge font sizes inside previews */
    .modal-preview [style*="font-size:2.4rem"] { font-size: 1.3rem !important; }
    .modal-preview [style*="font-size:2.2rem"] { font-size: 1.2rem !important; }
    /* Reduce padding inside preview */
    .modal-preview [style*="padding:64px"] { padding: 24px 16px !important; }
    .modal-preview [style*="padding:52px"] { padding: 20px 16px !important; }
    .modal-preview [style*="padding:36px"] { padding: 16px 12px !important; }
    .modal-preview [style*="padding:32px"] { padding: 14px 12px !important; }
    .modal-preview [style*="padding:28px"] { padding: 14px 12px !important; }
  }

  .modal-label {
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px;
  }
  .modal-title { font-weight: 800; font-size: 1.4rem; margin-bottom: 20px; letter-spacing: -0.02em; }
  .site-mockup {
    border-radius: 14px; overflow: hidden;
    border: 1.5px solid rgba(0,0,0,0.08);
    box-shadow: 0 8px 40px rgba(0,0,0,0.08);
  }
  .sm-bar {
    height: 40px; display: flex; align-items: center;
    padding: 0 16px; gap: 8px;
  }
  .sm-dot { width: 11px; height: 11px; border-radius: 50%; }
  .sm-url {
    flex: 1; height: 22px; border-radius: 6px;
    background: rgba(255,255,255,0.25); margin: 0 12px;
  }
  /* click hint on card */
  .portfolio-card .click-hint {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.6));
    color: white; font-size: 0.76rem; font-weight: 700;
    text-align: center; padding: 22px 0 10px;
    letter-spacing: 0.06em; text-transform: uppercase;
    opacity: 0; transition: opacity 0.25s;
    pointer-events: none;
  }
  .portfolio-card:hover .click-hint { opacity: 1; }

  body.lang-fade [data-i18n], body.lang-fade [data-i18n-ph] { opacity: 0; transition: opacity 0.15s; }
  [data-i18n], [data-i18n-ph] { transition: opacity 0.15s; }

  /* ── HAMBURGER ── */
  .hamburger {
    display: none; flex-direction: column; justify-content: center;
    gap: 5px; cursor: pointer; padding: 4px; background: none; border: none;
  }
  .hamburger span {
    display: block; width: 24px; height: 2.5px;
    background: var(--black); border-radius: 2px;
    transition: transform 0.3s, opacity 0.3s;
  }
  .hamburger.open span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

  /* Mobile nav drawer */
  .mobile-nav {
    display: none;
    position: fixed; top: 65px; left: 0; right: 0; z-index: 99;
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(14px);
    padding: 24px 28px 30px;
    border-bottom: 1px solid rgba(0,0,0,0.07);
    flex-direction: column; gap: 0;
    transform: translateY(-10px); opacity: 0;
    transition: transform 0.3s ease, opacity 0.3s ease;
    pointer-events: none;
  }
  .mobile-nav.open {
    display: flex; transform: translateY(0); opacity: 1; pointer-events: all;
  }
  .mobile-nav a {
    text-decoration: none; color: var(--black); font-size: 1.05rem;
    font-weight: 600; padding: 14px 0;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .mobile-nav a:last-child { border-bottom: none; }
  .mobile-nav-cta {
    display: block; margin-top: 20px;
    background: var(--black); color: var(--white) !important;
    text-align: center; padding: 14px 0 !important;
    border-radius: 50px; font-size: 0.95rem !important;
    font-weight: 700 !important; border-bottom: none !important;
  }

  /* ── TABLET (≤900px) ── */
  @media (max-width: 900px) {
    nav { padding: 14px 24px; }
    .nav-links { display: none; }
    .nav-cta { display: none; }
    .hamburger { display: flex; }

    #hero {
      grid-template-columns: 1fr;
      padding: 110px 28px 60px;
      min-height: auto;
    }
    .hero-visual { display: none; }
    .hero-text p { max-width: 100%; }

    .band-yellow {
      grid-template-columns: 1fr;
      padding: 60px 28px; gap: 28px;
    }

    #services { padding: 72px 28px; }
    .services-grid { grid-template-columns: repeat(2, 1fr); }

    #collab {
      grid-template-columns: 1fr;
      padding: 72px 28px; gap: 40px;
    }
    .collab-visual { height: 260px; }

let lang = 'pl';

function applyLang(l) {
  setTimeout(updateWaLink, 10);
  // Also re-apply to mobile nav which shares same data-i18n keys
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[l][el.getAttribute('data-i18n')];
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    const v = T[l][el.getAttribute('data-i18n-ph')];
    if (v) el.placeholder = v;
  });
  document.documentElement.lang = l;
  document.title = l === 'pl'
    ? 'Wislaweb – Be Visible w Warszawie'
    : 'Wislaweb – Be Visible in Warsaw';
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.textContent === l.toUpperCase())
  );
}

function setLang(l) {
  if (l === lang) return;
  lang = l;
  document.body.classList.add('lang-fade');
  setTimeout(() => {
    applyLang(l);
    document.body.classList.remove('lang-fade');
  }, 160);
}

applyLang('pl');

}

document.addEventListener('click', function(e) {

  const nav = document.getElementById('mobileNav');
  if (!btn.contains(e.target) && !nav.contains(e.target)) {
    btn.classList.remove('open');
    nav.classList.remove('open');

});

// ── SCROLL PROGRESS BAR ──
const scrollBar = document.getElementById('scroll-bar');
window.addEventListener('scroll', function() {
  var pct = window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100;
  scrollBar.style.width = Math.min(pct, 100) + '%';
}, { passive: true });

// ── REVEAL ON SCROLL ──
const obs = new IntersectionObserver(function(entries) {
  entries.forEach(function(e) {
    if (e.isIntersecting) {
      if (e.target.classList.contains('stagger')) {
        Array.from(e.target.children).forEach(function(child, idx) {
          child.style.opacity = '0';
          child.style.transform = 'translateY(20px)';
          child.style.transition = 'opacity 0.6s cubic-bezier(0.22,1,0.36,1), transform 0.6s cubic-bezier(0.22,1,0.36,1)';
          child.style.transitionDelay = (idx * 0.12) + 's';
          (function(c){ setTimeout(function() {
            c.style.opacity = '1';
            c.style.transform = 'translateY(0)';
          }, 50 + idx * 120); })(child);
        });
      }
      e.target.classList.add('visible');
      obs.unobserve(e.target);
    }
  });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal, .reveal-left, .reveal-right').forEach(function(el) { obs.observe(el); });

// ── RIPPLE EFFECT ──
document.querySelectorAll('.btn-primary,.btn-dark,.cta-btn-yellow,.nav-cta').forEach(function(btn) {
  btn.style.position = 'relative';
  btn.style.overflow = 'hidden';
  btn.addEventListener('click', function(e) {
    var r = document.createElement('span');
    var rect = this.getBoundingClientRect();
    var size = Math.max(rect.width, rect.height);
    r.style.cssText = 'position:absolute;border-radius:50%;background:rgba(255,255,255,0.28);pointer-events:none;transform:scale(0);animation:rippleAnim 0.5s linear;width:'+size+'px;height:'+size+'px;left:'+(e.clientX-rect.left-size/2)+'px;top:'+(e.clientY-rect.top-size/2)+'px;';
    this.appendChild(r);
    var self = this;
    setTimeout(function(){ r.remove(); }, 520);
  });
});
var rs = document.createElement('style');
rs.textContent = '@keyframes rippleAnim{to{transform:scale(2.8);opacity:0}}';
document.head.appendChild(rs);

function openPreview(type) {
  var lang = document.documentElement.lang || 'pl';
  var p = previewHTML[type];
  if (!p) return;
  var meta = p[lang] || p['pl'];
  document.getElementById('modalContent').innerHTML =
    '<div class="modal-label">' + meta.label + '</div>'
    + '<div class="modal-title">' + meta.title + '</div>'
    + p.html;
  var overlay = document.getElementById('previewModal');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  // On mobile, scale inner preview to fit width
  if (window.innerWidth <= 600) {
    setTimeout(function() {
      var preview = document.querySelector('.modal-preview > div:last-child');
      if (preview) {
        var available = window.innerWidth - 24;
        var natural = preview.scrollWidth;
        if (natural > available) {
          var scale = available / natural;
          preview.style.transform = 'scale(' + scale + ')';
          preview.style.transformOrigin = 'top left';
          preview.style.width = (natural) + 'px';
          preview.parentElement.style.width = available + 'px';
          preview.parentElement.style.overflow = 'hidden';
        }
      }
    }, 120);
  }
}

function closePreview() {
  var overlay = document.getElementById('previewModal');
  var box = document.getElementById('modalBox');
  box.style.transform = 'translateY(20px) scale(0.97)';
  box.style.opacity = '0';
  overlay.style.opacity = '0';
  setTimeout(function() {
    overlay.classList.remove('open');
    box.style.transform = '';
    box.style.opacity = '';
    overlay.style.opacity = '';
    document.body.style.overflow = '';
  }, 320);
}

function closeOnOverlay(e) {
  if (e.target === document.getElementById('previewModal')) closePreview();
}

document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closePreview(); });
